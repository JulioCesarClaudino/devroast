version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devroast-db
    environment:
      POSTGRES_DB: devroast
      POSTGRES_USER: devroast_user
      POSTGRES_PASSWORD: devroast_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U devroast_user -d devroast
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devroast-network

  adminer:
    image: adminer
    container_name: devroast-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devroast-network

volumes:
  postgres_data:

networks:
  devroast-network:
    driver: bridge
